<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2D Game Store</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- WELCOME SCREEN -->
  <div id="welcome-screen">
    <button id="play-button">Play</button>
  </div>

  <!-- GAME SCREEN -->
  <div id="game-screen">
    <div id="player"></div>
    <div class="corner-square" id="top-left"></div>
    <div class="corner-square" id="top-right"></div>
    <div class="corner-square" id="bottom-left"></div>
    <div class="corner-square" id="bottom-right"></div>
  </div>

  <!-- POPUP -->
  <div id="popup"></div>

  <script type="module" src="main.js"></script>
</body>
</html>
